services:
  ts-forecast-studio:
    build:
      context: .
      dockerfile: Dockerfile
    image: ts-forecast-studio:latest
    container_name: ts-forecast-studio
    ports:
      - "${APP_PORT:-8501}:8501"
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    volumes:
      # Optional: mount a local folder so sample/exported files survive
      # container restarts. Not required for the app to function.
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
