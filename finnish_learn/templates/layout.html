<!DOCTYPE html>
<html lang="en">

<head>

    <title>Suomi Sanasto App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f2f8f8;
            padding-top: 50px;
        }

        .card {
            box-shadow: 0 4px 8px rgba(10, 210, 245, 0.1);
        }
    </style>
</head>

<body>

        <div class="row justify-content-center">

                <div class="text-center mt-4">
                    <a href="/" class="btn btn-secondary btn-sm">Back to Menu</a>
                </div>
            </div>
        </div>
    </div>

</html>
