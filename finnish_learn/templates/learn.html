{% extends 'layout.html' %}
{% block content %}
<div class="card text-center p-1">
    <h1 class="mb-3 text-primary">Learn Mode</h1>
    <div id="learnArea">
        <h2 id="wordDisplay" class="display-6"></h2>
        <p id="defDisplay" class="lead mt-7"></p>
    </div>
    <div class="mt-3 d-flex justify-content-between align-items-center">
        <span id="progress" class="text-muted"></span>
        <button class="btn btn-primary" onclick="nextWord()">Next Word</button>
    </div>
</div>

<script>
    const vocab = {{ vocab | tojson }};
    let index = 0;

    function nextWord() {
        if (index >= vocab.length) {
            alert("You have reviewed all words!");
            window.location.href = '/';
            return;
        }
        document.getElementById('wordDisplay').innerText = vocab[index].word;
        document.getElementById('defDisplay').innerText = vocab[index].definition;
        document.getElementById('progress').innerText = `${index + 1} / ${vocab.length}`;
        index++;
    }
    nextWord(); // Start on load
</script>
{% endblock %}
